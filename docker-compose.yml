services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: redibook
      POSTGRES_USER: redibook
      POSTGRES_PASSWORD: redibook
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redibook -d redibook"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: ["pnpm", "db:migrate"]
    environment:
      DATABASE_URL: postgresql://redibook:redibook@postgres:5432/redibook
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: ["node", "apps/api/dist/main.js"]
    environment:
      DATABASE_URL: postgresql://redibook:redibook@postgres:5432/redibook
      REDIS_URL: redis://redis:6379
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/v1/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: ["node", "apps/worker/dist/main.js"]
    environment:
      DATABASE_URL: postgresql://redibook:redibook@postgres:5432/redibook
      REDIS_URL: redis://redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: ["node", "apps/web/.output/server/index.mjs"]
    environment:
      API_BASE_URL: http://api:3001/api/v1
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
